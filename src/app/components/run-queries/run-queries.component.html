<div class="space-y-6">
  <!-- Wizard Steps -->
  <div class="flex items-center justify-center space-x-4 mb-6">
    <button
      (click)="goToStep(1)"
      [disabled]="!isStepSelectable(1)"
      [ngClass]="{
        'text-blue-600 font-semibold': step === 1,
        'text-gray-500 hover:text-gray-700': step !== 1 && isStepSelectable(1),
        'text-gray-300 cursor-not-allowed': !isStepSelectable(1)
      }"
      class="focus:outline-none transition-colors"
    >
      1. Configuration
    </button>
    <div class="text-gray-300">/</div>
    <button
      (click)="goToStep(2)"
      [disabled]="!isStepSelectable(2)"
      [ngClass]="{
        'text-blue-600 font-semibold': step === 2,
        'text-gray-500 hover:text-gray-700': step !== 2 && isStepSelectable(2),
        'text-gray-300 cursor-not-allowed': !isStepSelectable(2)
      }"
      class="focus:outline-none transition-colors"
    >
      2. Upload & Run
    </button>
    <div class="text-gray-300">/</div>
    <button
      (click)="goToStep(3)"
      [disabled]="!isStepSelectable(3)"
      [ngClass]="{
        'text-blue-600 font-semibold': step === 3,
        'text-gray-500 hover:text-gray-700': step !== 3 && isStepSelectable(3),
        'text-gray-300 cursor-not-allowed': !isStepSelectable(3)
      }"
      class="focus:outline-none transition-colors"
    >
      3. Results
    </button>
  </div>

  <!-- Configuration Form -->
  <div [hidden]="step !== 1">
    <app-config-form [isRunQueries]="true" (next)="nextStep()"></app-config-form>
  </div>

  <!-- File Upload -->
  <div [hidden]="step !== 2">
    <app-file-upload
      [(file)]="responseFile"
      [(csvRows)]="responseCsvRows"
      (prev)="prevStep()"
      (run)="startResponseGeneration($event)"
      [instruction]="'CSV file with at least \'query\' column'"
      [buttonText]="'Run Queries'"
      [requiredColumns]="['query']"
    ></app-file-upload>
  </div>

  <!-- Progress Bar -->
  <app-progress-bar
    *ngIf="isProcessingResponse"
    [progress]="responseProgress"
    [text]="'Generating responses... (' + completedRows + ' / ' + totalRows + ')'"
    [canStop]="true"
    (stop)="stopResponseGeneration()"
  ></app-progress-bar>

  <!-- Results Table -->
  <div [hidden]="step !== 3">
    <app-csv-table
      [data]="responseResults"
      [columns]="columns"
      [title]="'Query Results'"
      [exportFileName]="'query_results'"
    >
      <button
        footer
        (click)="prevStep()"
        class="bg-white border border-gray-300 text-gray-700 px-4 py-2 rounded-md hover:bg-gray-50 transition-colors font-medium"
      >
        Back to Upload
      </button>
    </app-csv-table>
  </div>
</div>
