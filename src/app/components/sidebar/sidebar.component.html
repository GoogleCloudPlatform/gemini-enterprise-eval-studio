<aside [ngClass]="isCollapsed ? 'w-16' : 'w-64'" class="bg-white border-r border-gray-200 flex flex-col h-full transition-all duration-300">
  <div class="p-4 flex items-center space-x-2 border-b border-gray-200">
    <!-- Logo (4-pointed star) -->
    <div class="w-8 h-8 flex items-center justify-center border border-gray-300 rounded-md bg-gradient-to-br from-blue-500 to-purple-600 text-white flex-shrink-0">
       <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
           <path d="M12,2L14.8,8.4L21.2,11.2L14.8,14L12,20.4L9.2,14L2.8,11.2L9.2,8.4Z"/>
       </svg>
    </div>
    <div *ngIf="!isCollapsed" class="overflow-hidden whitespace-nowrap">
      <h1 class="font-bold text-gray-900 text-sm tracking-tight leading-none uppercase">Gemini Enterprise</h1>
      <p class="text-xs text-gray-500 font-semibold tracking-wider uppercase mt-0.5">Eval Studio</p>
    </div>
  </div>
  <!-- Navigation -->
  <ng-container *ngIf="currentTab$ | async as currentTab">
    <nav class="flex-1 p-4 space-y-1">
      <button (click)="setTab('run')" [ngClass]="{'bg-blue-50 text-blue-600': currentTab === 'run', 'text-gray-700 hover:bg-gray-50': currentTab !== 'run'}" class="w-full flex items-center space-x-2 p-2 rounded-md text-left transition-colors" aria-label="Run Evaluation">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
        <span *ngIf="!isCollapsed">Run Evaluation</span>
      </button>
      <button (click)="setTab('compare')" [ngClass]="{'bg-blue-50 text-blue-600': currentTab === 'compare', 'text-gray-700 hover:bg-gray-50': currentTab !== 'compare'}" class="w-full flex items-center space-x-2 p-2 rounded-md text-left transition-colors" aria-label="Compare Evals">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="18" r="3"></circle><circle cx="6" cy="6" r="3"></circle><path d="M13 6h3a2 2 0 0 1 2 2v7"></path><path d="M11 18H8a2 2 0 0 1-2-2V9"></path></svg>
        <span *ngIf="!isCollapsed">Compare Evals</span>
      </button>
      <button (click)="setTab('golden')" [ngClass]="{'bg-blue-50 text-blue-600': currentTab === 'golden', 'text-gray-700 hover:bg-gray-50': currentTab !== 'golden'}" class="w-full flex items-center space-x-2 p-2 rounded-md text-left transition-colors" aria-label="Get Golden">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></svg>
        <span *ngIf="!isCollapsed">Get Golden</span>
      </button>
      <button (click)="setTab('about')" [ngClass]="{'bg-blue-50 text-blue-600': currentTab === 'about', 'text-gray-700 hover:bg-gray-50': currentTab !== 'about'}" class="w-full flex items-center space-x-2 p-2 rounded-md text-left transition-colors" aria-label="About Eval Studio">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
        <span *ngIf="!isCollapsed">About</span>
      </button>
    </nav>
  </ng-container>

  <!-- Toggle Button -->
  <div class="mt-auto p-4 border-t border-gray-200">
    <button (click)="toggleCollapse()" [aria-label]="isCollapsed ? 'Expand sidebar' : 'Collapse sidebar'" class="w-full flex items-center justify-center p-2 hover:bg-gray-100 rounded-md transition-colors">
      <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path *ngIf="!isCollapsed" d="M15 19l-7-7 7-7" />
        <path *ngIf="isCollapsed" d="M9 5l7 7-7 7" />
      </svg>
    </button>
  </div>
</aside>
